<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raul | Portofoliu</title>
    <style>
        /* Design-ul paginii */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #252540 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background: #00ff88;
            border-radius: 50%;
            margin-bottom: 20px;
            display: inline-block;
            line-height: 100px;
            font-size: 40px;
        }

        h1 { margin: 10px 0; font-size: 24px; color: #00ff88; }
        p { color: #ccc; margin-bottom: 30px; }

        .links { display: flex; flex-direction: column; gap: 15px; }

        .link-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .link-btn:hover {
            background: #00ff88;
            color: #1e1e2f;
            border-color: #00ff88;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-img">👨‍💻</div>
        <h1>Salut, sunt Raul!</h1>
        <p>Pasionat de C# și Web Development</p>
        
        <div class="links">
            <a href="https://github.com/raul24-ark" class="link-btn">GitHub-ul Meu</a>
            <a href="#" class="link-btn">Proiecte C#</a>
            <a href="mailto:contact@exemplu.com" class="link-btn">Contactează-mă</a>
        </div>
    </div>

</body>
</html>
